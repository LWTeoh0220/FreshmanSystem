<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      window.onerror = function(msg, src, lineno, colno, error) {
        document.body.innerHTML = '<div style="color:red;padding:20px;font-size:20px;z-index:9999;position:relative;">Global Error in index.html: ' + msg + '<br>Line: ' + lineno + '</div>';
      };
      window.addEventListener('unhandledrejection', function(e) {
        document.body.innerHTML = '<div style="color:red;padding:20px;font-size:20px;z-index:9999;position:relative;">Promise Error in index.html: ' + e.reason + '</div>';
      });
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>卫立大学楼 校园地图</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
